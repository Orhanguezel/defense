# =============================================================
# nginx — sultandefense.com (production reverse proxy)
# Frontend  : Next.js standalone  127.0.0.1:3040
# Backend   : Fastify              127.0.0.1:8090
# Admin     : Next.js (admin)      127.0.0.1:3041  (admin.sultandefense.com)
# SSL       : Cloudflare proxy (Full) + origin cert /etc/nginx/ssl/origin.*
#             (Cloudflare Full(strict) istenirse Origin CA cert kur)
# =============================================================

# ---- HTTP → HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name sultandefense.com www.sultandefense.com admin.sultandefense.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS: ana site (root + www) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name sultandefense.com www.sultandefense.com;

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    client_max_body_size 25m;

    # Next.js static
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    location /media/ {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Backend API + uploads (Fastify)
    location /api/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        add_header         Cache-Control "public, max-age=86400";
    }

    # Frontend (Next.js)
    location / {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    access_log /var/log/nginx/sultandefense.access.log;
    error_log  /var/log/nginx/sultandefense.error.log;
}

# ---- HTTPS: admin panel (admin.sultandefense.com) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name admin.sultandefense.com;

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    # Admin -> backend API (rewrite zaten next.config'de; dogrudan da proxy)
    location /api/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:8090;
    }
    # Statik media (frontend public/media) — admin onizlemeleri icin
    location /media/ {
        proxy_pass http://127.0.0.1:3040;
        add_header Cache-Control "public, max-age=86400";
    }

    # Admin Next.js
    location / {
        proxy_pass         http://127.0.0.1:3041;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    access_log /var/log/nginx/sultandefense-admin.access.log;
    error_log  /var/log/nginx/sultandefense-admin.error.log;
}
