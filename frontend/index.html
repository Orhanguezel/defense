<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bereket Fide - Kaliteli ve Yüksek Verimli Fide Üretimi" />
  <title>Bereket Fide | Yakında</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 2.5rem;
    }

    .logo span {
      color: #27823b;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      font-size: 1.1rem;
      color: #a7bfa7;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: rgba(39, 130, 59, 0.15);
      border: 1px solid rgba(39, 130, 59, 0.4);
      color: #69ba83;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #27823b;
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    a {
      color: #69ba83;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #4b634b;
    }
  </style>
</head>
<body>

  <div class="logo">BEREKET <span>FİDE</span></div>

  <span class="badge">Yapım Aşamasında</span>

  <h1>Modern Fide Üretim Tesisimiz Hazırlanıyor</h1>

  <div class="divider"></div>

  <p>
    Bereket Fide web sitemiz yapım aşamasındadır.
    Çok yakında en kaliteli fide ve tohum çeşitlerimizle sizlerle buluşacağız.
  </p>

  <p>
    <a href="mailto:info@bereketfide.com.tr">info@bereketfide.com.tr</a>
  </p>

  <footer>&copy; 2026 Bereket Fide. Tüm hakları saklıdır.</footer>

</body>
</html>
